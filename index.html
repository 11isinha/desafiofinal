<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Exercício 05 - A Armadura de Ouro🪙</title>
</head>
<body>

    <div class="layout-wrapper">
        
        <div class="oraculo-container">
            <div class="header">
                <h1>Oráculo do Zodíaco</h1>
                <p>Descubra qual Armadura de Ouro o escolheu.</p>
            </div>

            <div class="input-area">
                <label for="data-nascimento">Digite sua Data de Nascimento:</label>
                <input type="date" id="data-nascimento" required>
                <button onclick="revelarArmadura()">Revelar Destino</button>
            </div>

            <div id="resultado-basico" class="hidden">
                <h3 id="mensagem-oraculo">O Cosmo respondeu ao seu chamado! Veja seus atributos ao lado.</h3>
            </div>
        </div>

        <div id="ficha-area" class="ficha-container hidden">
            <div class="ficha-header">
                <img id="img-cavaleiro" src="" alt="Avatar do Cavaleiro" class="cavaleiro-avatar">
                <h2 id="nome-cavaleiro">Nome do Cavaleiro</h2>
                <h3 id="nome-signo">Signo</h3>
            </div>
            
            <div class="ficha-status">
                <div class="stat-row">
                    <span class="stat-label">Cosmo:</span> 
                    <div class="bar-bg"><div class="bar-fill" id="bar-cosmo"></div></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Velocidade:</span> 
                    <div class="bar-bg"><div class="bar-fill" id="bar-vel"></div></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Técnica:</span> 
                    <div class="bar-bg"><div class="bar-fill" id="bar-tec"></div></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Força Física:</span> 
                    <div class="bar-bg"><div class="bar-fill" id="bar-for"></div></div>
                </div>
            </div>

            <div class="ficha-extra">
                <p><strong>Casa Guardada:</strong> <span id="ficha-casa"></span></p>
                <p><strong>Golpe Secreto:</strong> <span id="desc-poder"></span></p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
